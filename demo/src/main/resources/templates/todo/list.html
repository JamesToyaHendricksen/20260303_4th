<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Todo List</h1>
        <a class="btn btn-primary" th:href="@{/todo/new}" href="/todo/new">&#26032;&#35215;&#30331;&#37682;</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th scope="col" style="width: 80px;">ID</th>
                    <th scope="col">Title</th>
                    <th scope="col" style="width: 140px;">Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(todoList)}">
                    <td colspan="3" class="text-center py-4">No Todo items.</td>
                </tr>
                <tr th:each="todo : ${todoList}">
                    <td th:text="${todo.id}">1</td>
                    <td th:text="${todo.title}">Sample task</td>
                    <td th:text="${todo.status}">Not Started</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>
</html>
